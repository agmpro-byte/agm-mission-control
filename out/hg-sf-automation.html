<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HG Salesforce Automation Dashboard</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2128;
    --panel-2: #242c36;
    --border: #2d3742;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #1a3a0a;
    --accent-2: #2d5016;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #a371f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
    font-size: 11px;
  }
  header {
    background: linear-gradient(135deg, #1a3a0a 0%, #2d5016 50%, #1a3a0a 100%);
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0 0 2px;
    font-size: 16px;
    letter-spacing: -0.3px;
  }
  header .sub {
    color: #c8e0bf;
    font-size: 10px;
    margin-bottom: 10px;
  }
  .count-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 6px;
  }
  .count-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 10px;
    border-radius: 4px;
  }
  .count-card .num { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .count-card .lbl { font-size: 9px; color: #c8e0bf; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 1px; }
  .count-card .breakdown { font-size: 9px; color: #8fa687; margin-top: 1px; }

  main { max-width: none; width: 100%; margin: 0; padding: 12px 20px 40px; }
  .tabs { display: flex; flex-wrap: wrap; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .tab {
    padding: 6px 12px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--green); }
  .tab .badge {
    display: inline-block;
    background: var(--panel-2);
    color: var(--muted);
    padding: 0 5px;
    border-radius: 7px;
    font-size: 9px;
    margin-left: 4px;
  }
  .tab.active .badge { background: var(--green); color: #0f1419; }

  .section { display: none; }
  .section.active { display: block; }
  .section h2 { margin: 0 0 2px; font-size: 14px; }
  .section .lede { color: var(--muted); margin-bottom: 10px; font-size: 10px; }

  .filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .filter-bar input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 11px;
    min-width: 240px;
    font-family: inherit;
  }
  .chip {
    padding: 3px 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 10px;
    cursor: pointer;
    color: var(--muted);
  }
  .chip.on { background: var(--green); color: #0f1419; border-color: var(--green); }

  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { text-align: left; padding: 6px 8px; color: var(--muted); text-transform: uppercase; font-size: 9px; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  td { padding: 5px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: var(--panel); }
  .status {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .status.active { background: #1f3b1a; color: var(--green); }
  .status.inactive { background: #3b1f1f; color: var(--red); }
  .status.customer { background: #1e3a55; color: var(--blue); }
  .status.internal { background: #2d2d35; color: var(--muted); }
  .mono { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 10px; color: var(--muted); }
  .obj-tag {
    display: inline-block;
    background: var(--panel-2);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 9px;
    color: var(--muted);
    font-family: ui-monospace, monospace;
  }

  /* Journey map */
  .stage {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    background: var(--panel);
    overflow: hidden;
  }
  .stage-header {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .stage-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent-2);
    color: var(--text);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    flex-shrink: 0;
  }
  .stage-title { flex: 1; font-weight: 600; font-size: 12px; }
  .stage-flag {
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .stage-flag.ok { background: #1f3b1a; color: var(--green); }
  .stage-flag.gap { background: #3b2f1a; color: var(--yellow); }
  .stage-flag.critical { background: #3b1f1f; color: var(--red); }
  .stage-body {
    padding: 8px 12px 12px 44px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text);
    display: none;
  }
  .stage.open .stage-body { display: block; }
  .stage-body .row { margin-bottom: 6px; }
  .stage-body .row strong { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 1px; }

  /* Gaps list */
  .gap-item {
    padding: 10px 14px;
    background: var(--panel);
    border-left: 3px solid var(--red);
    border-radius: 3px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .gap-num { color: var(--red); font-weight: 700; margin-right: 8px; }

  details > summary { cursor: pointer; user-select: none; padding: 3px 0; font-size: 10px; color: var(--muted); }
  details[open] > summary { color: var(--text); }

  footer { text-align: center; padding: 16px; color: var(--muted); font-size: 10px; border-top: 1px solid var(--border); }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>

// WORKFLOW RULES
sections.rules = () => {
  let html = '<h2>Workflow Rules</h2><div class="lede">All ' + DATA.workflow_rules.length + ' workflow rules across every object. Click a row for criteria and actions.</div>';
  html += '<div class="filter-bar"><input id="flt-rules" placeholder="Filter by name, object, criteria..."><span class="chip on" data-f="all">All</span><span class="chip" data-f="active">Active</span><span class="chip" data-f="inactive">Inactive</span><span class="chip" data-f="customer">Customer-Facing</span></div>';
  html += '<table><thead><tr><th>Object</th><th>Name</th><th>Status</th><th>Audience</th><th>Actions</th><th>Details</th></tr></thead><tbody id="rules-body">';
  DATA.workflow_rules.forEach(r => {
    const actions = [...(r.immediateActions||[]), ...(r.timeTriggers||[]).flatMap(t => t.actions)];
    const actionLabels = actions.map(a => a.type).filter(Boolean);
    const actionSummary = actionLabels.length ? [...new Set(actionLabels)].join(', ') : '—';
    const details = `
      <details>
        <summary>criteria (${(r.criteria||[]).length}) · actions (${actions.length})</summary>
        <div style="padding:8px 0;font-size:11px;">
          ${r.triggerType ? '<div><b>Trigger:</b> ' + esc(r.triggerType) + '</div>' : ''}
          ${r.formula ? '<div class="mono"><b>Formula:</b> ' + esc(r.formula) + '</div>' : ''}
          ${(r.criteria||[]).length ? '<div><b>Criteria:</b><ul style="margin:4px 0;padding-left:18px">' + r.criteria.map(c => '<li class="mono">' + esc(c.field) + ' ' + esc(c.op) + ' ' + esc(c.value) + '</li>').join('') + '</ul></div>' : ''}
          ${actions.length ? '<div><b>Actions:</b><ul style="margin:4px 0;padding-left:18px">' + actions.map(a => '<li>' + esc(a.type) + ': ' + esc(a.name) + '</li>').join('') + '</ul></div>' : ''}
          ${(r.timeTriggers||[]).length ? '<div><b>Time triggers:</b> ' + r.timeTriggers.map(t => esc(t.offset + (t.offsetFromField ? ' from ' + t.offsetFromField : ''))).join(', ') + '</div>' : ''}
        </div>
      </details>`;
    html += `<tr data-active="${r.active}" data-customer="${r.customerFacing}" data-search="${esc((r.name+' '+r.object+' '+JSON.stringify(r.criteria)).toLowerCase())}">
      <td><span class="obj-tag">${esc(r.object)}</span></td>
      <td>${esc(r.name)}</td>
      <td><span class="status ${r.active?'active':'inactive'}">${r.active?'Active':'Inactive'}</span></td>
      <td>${r.customerFacing ? '<span class="status customer">Customer</span>' : '<span class="status internal">Internal</span>'}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(actionSummary)}</td>
      <td>${details}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  return html;
};

    const text = typeof g === 'string' ? g : (g.description || g.gap || JSON.stringify(g));
    html += `<div class="gap-item"><span class="gap-num">#${i+1}</span>${esc(text)}</div>`;
  });
  return html;
};

// --- Render sections ---
const sectionsEl = document.getElementById('sections');
sectionsEl.innerHTML = TABS.map((t,i) =>
  `<div class="section${i===0?' active':''}" id="sec-${t.id}">${sections[t.id] ? sections[t.id]() : '<p>Not yet built.</p>'}</div>`
).join('');

// --- Filters ---
function wireFilter(inputId, bodyId) {
  const el = document.getElementById(inputId);
  if (!el) return;
  el.addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    const tbody = bodyId ? document.getElementById(bodyId) : el.closest('.section').querySelector('tbody');
    if (!tbody) return;
    Array.from(tbody.querySelectorAll('tr')).forEach(r => {
      const s = r.dataset.search || r.textContent.toLowerCase();
      r.style.display = s.includes(q) ? '' : 'none';
    });
  });
}
wireFilter('flt-rules', 'rules-body');
wireFilter('flt-flows', 'flows-body');
wireFilter('flt-alerts', 'alerts-body');
wireFilter('flt-trig', 'trig-body');
wireFilter('flt-tmpl');

// Chip filters for rules tab
document.querySelectorAll('#sec-rules .chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('#sec-rules .chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    const f = chip.dataset.f;
    const tbody = document.getElementById('rules-body');
    Array.from(tbody.querySelectorAll('tr')).forEach(r => {
      let show = true;
      if (f === 'active') show = r.dataset.active === 'true';
      else if (f === 'inactive') show = r.dataset.active === 'false';
      else if (f === 'customer') show = r.dataset.customer === 'true';
      r.style.display = show ? '' : 'none';
    });
  });
});
</script>
